spring.application.name=NewBank

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (PostgreSQL)
# spring.datasource.url=jdbc:postgresql://localhost:5432/newbank
# spring.datasource.username=postgres
# spring.datasource.password=password
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# H2 Database Configuration (for development)
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# MongoDB Configuration (disabled - not running)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongodb.MongoAutoConfiguration

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.project.NewBank=DEBUG
